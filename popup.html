<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTFiller</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>RTFiller</h1>
        <label class="switch">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <section class="locator-section">
        <div class="section-header">
          <h2>Locators</h2>
          <button id="addLocator" type="button">Add</button>
        </div>
        <div id="locators"></div>
      </section>

      <label>
        Word database
        <textarea id="texts" rows="9" placeholder="One word per line"></textarea>
      </label>

      <label class="checkbox">
        <input id="fillExistingOnLoad" type="checkbox">
        Fill existing matches on page load
      </label>

      <label class="checkbox">
        <input id="overwriteFilled" type="checkbox">
        Overwrite filled fields
      </label>

      <p id="status" role="status"></p>
    </main>

    <script src="word-bank.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
